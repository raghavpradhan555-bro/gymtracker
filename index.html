<!DOCTYPE html>
<html lang="en">
<head >
  <meta charset="UTF-8">
  <title>Gym Tracker Ultra pro max 2tb </title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050505">
  <link rel="icon" href="preview.png"
<meta property="og:title" content="Gym Tracker Ultra pro max 2tb">
<meta property="og:description" content="Track your workouts and progress easily">
<meta property="og:image" content="https://raghavpradhan555-bro.github.io/gymtracker/preview.png">
<meta property="og:url" content="https://raghavpradhan555-bro.github.io/gymtracker/">
<meta property="og:type" content="website">
 



  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --glass: rgba(154, 32, 32, 0.08);
      --glass-border: rgba(41, 39, 36, 0.12);
      --accent: #007AFF;
      --accent-glow: rgba(206, 10, 10, 0.5);
      --bg-dark: #050505;
      --success: #34c759;
      --warning: #ffcc00;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      margin: 0; padding: 20px; color: white; min-height: 100vh;
      background-color: var(--bg-dark); display: flex; justify-content: center; overflow-x: hidden;
    }

    .mesh-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; background: var(--bg-dark); overflow: hidden;
    }

    .blob {
      position: absolute; width: 600px; height: 600px; border-radius: 50%;
      filter: blur(80px); opacity: 0.15; animation: drift 25s infinite alternate ease-in-out;
    }
    .b1 { background: #08ea39; top: -10%; left: -10%; }
    .b2 { background: #ea07e6; bottom: -10%; right: -10%; animation-delay: -5s; }
    .b3 { background: #ff2d55; top: 40%; left: 30%; animation-delay: -10s; opacity: 0.1; }

    @keyframes drift {
      from { transform: translate(0,0) rotate(0deg) scale(1); }
      to { transform: translate(120px, 120px) rotate(45deg) scale(1.3); }
    }

    .container { width: 100%; max-width: 410px; z-index: 1; animation: mainFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
    @keyframes mainFadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    h1 {
      text-align: center; font-weight: 800; font-size: 2.8rem; letter-spacing: -1.5px;
      margin: 20px 0 30px 0; background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .glass {
      background: var(--glass); backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%); border: 1px solid var(--glass-border);
      border-radius: 30px; padding: 24px; margin-bottom: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .label-text {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
      color: rgba(255,255,255,0.4); margin-bottom: 10px; display: block; padding-left: 5px;
    }

    input {
      width: 100%; height: 54px; padding: 0 20px; margin: 8px 0 16px 0;
      border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);
      background: rgba(0, 0, 0, 0.4); color: white; font-size: 16px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    input:focus {
      outline: none; background: rgba(0, 0, 0, 0.6); border-color: var(--accent);
      box-shadow: 0 0 25px -5px var(--accent-glow); transform: translateY(-2px);
    }

    input[type="date"] { color-scheme: dark; }

    .btn-group { display: flex; gap: 8px; margin-bottom: 25px; }
    button { border: none; cursor: pointer; font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    .tab-btn { flex: 1; height: 48px; border-radius: 15px; background: rgba(255,255,255,0.06); color: #999; }
    .tab-btn.active { background: #fff; color: #000; transform: scale(1.04); box-shadow: 0 8px 20px rgba(255,255,255,0.1); }
    .primary-btn { width: 100%; height: 58px; border-radius: 20px; background: var(--accent); color: white; font-size: 18px; box-shadow: 0 8px 25px -5px var(--accent-glow); }
    .filter-btn { background: rgba(255,255,255,0.1); color: white; height: 44px; border-radius: 12px; flex: 1; font-size: 13px; }
    button:active { transform: scale(0.94); }

    .entry {
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 22px; margin-bottom: 15px; position: relative;
      animation: entryReveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    @keyframes entryReveal { from { opacity: 0; transform: translateX(-20px); filter: blur(10px); } to { opacity: 1; transform: translateX(0); filter: blur(0); } }
    .stats { font-size: 1.5rem; font-weight: 800; color: var(--accent); display: flex; align-items: baseline; gap: 6px; margin-top: 5px; }
    .stats span { font-size: 0.9rem; color: #666; font-weight: 400; }
    .date-badge { position: absolute; top: 22px; right: 22px; font-size: 11px; color: #555; font-weight: 500; }
    .flash-success { animation: successPulse 0.5s ease-out; }
    @keyframes successPulse { 50% { border-color: var(--success); } }

    /* EDITING MODE STYLES */
    .edit-input { height: 40px !important; margin: 5px 0 !important; font-size: 14px !important; }

    footer { text-align: center; margin-top: 50px; padding-bottom: 40px; }
    .made-by { font-size: 10px; text-transform: uppercase; letter-spacing: 4px; color: rgba(255,255,255,0.3); margin: 0; }
    .author { font-size: 16px; letter-spacing: 1.5px; font-weight: 600; margin-top: 6px; background: linear-gradient(to right, #fff, rgba(255,255,255,0.3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body>

<div class="mesh-container">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="container">
  <h1>Tracker Pro</h1>

  <div class="btn-group">
    <button onclick="setDay('push')" id="pushBtn" class="tab-btn">Push</button>
    <button onclick="setDay('pull')" id="pullBtn" class="tab-btn">Pull</button>
    <button onclick="setDay('legs')" id="legsBtn" class="tab-btn">Legs</button>
  </div>

  <div id="inputCard" class="glass">
    <span class="label-text">Log New Activity</span>
    <input id="ex" placeholder="Exercise" spellcheck="false">
    <div style="display:flex; gap:12px;">
      <input id="w" type="number" placeholder="Weight (kg)">
      <input id="r" type="number" placeholder="Reps">
    </div>
    <button class="primary-btn" onclick="add()">Save Set</button>
  </div>

  <div class="glass">
    <span class="label-text">Performance Filter</span>
    <div style="display:flex; gap:12px;">
      <input type="date" id="start" style="height:44px; margin-bottom:8px;">
      <input type="date" id="end" style="height:44px; margin-bottom:8px;">
    </div>
    <div style="display:flex; gap:12px;">
      <button class="filter-btn" onclick="filterData()">Filter</button>
      <button class="filter-btn" onclick="downloadPDF()">Export PDF</button>
    </div>
  </div>

  <div id="output"></div>

  <footer>
    <p class="made-by">Made by</p>
    <p class="author">WydRaghav</p>
  </footer>
</div>

<script>
  let data = JSON.parse(localStorage.getItem("gymData")) || [];
  let currentDay = "";

  function setDay(d){
    currentDay = d;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(d+"Btn").classList.add("active");
    show();
  }

  function add(){
    if(!currentDay) return alert("Please select a workout type (Push/Pull/Legs)");
    let ex = document.getElementById("ex").value, 
        w = document.getElementById("w").value, 
        r = document.getElementById("r").value;
    
    if(!ex||!w||!r) return;

    data.push({
      id: Date.now(),
      day: currentDay,
      ex, w, r,
      date: new Date().toISOString().split('T')[0]
    });

    const card = document.getElementById('inputCard');
    card.classList.add('flash-success');
    setTimeout(() => card.classList.remove('flash-success'), 500);

    save(); 
    document.getElementById("ex").value = "";
    document.getElementById("w").value = "";
    document.getElementById("r").value = "";
    show();
  }

  function filterData(){
    let s = document.getElementById("start").value, 
        e = document.getElementById("end").value;
    let filtered = data.filter(x => (!s || x.date >= s) && (!e || x.date <= e));
    show(filtered);
  }

  function show(customList){
    let out = document.getElementById("output");
    out.innerHTML="";
    let list = customList || data.filter(x=>x.day===currentDay);
    list = list.slice().reverse(); 
    
    list.forEach((e, index) => {
      let div = document.createElement('div');
      div.className = 'entry';
      div.id = `entry-${e.id}`;
      div.style.animationDelay = `${index * 0.06}s`;
      
      // Default view
      div.innerHTML = `
        <span class="date-badge">${e.date}</span>
        <b style="font-size:1.1rem; letter-spacing:-0.3px;">${e.ex}</b>
        <div class="stats">
          ${e.w} <span>kg</span> <span style="margin: 0 4px; color:#222">/</span> ${e.r} <span>reps</span>
        </div>
        <div style="margin-top:18px; display:flex; gap:10px;">
          <button class="tab-btn" style="height:34px; font-size:11px; background:rgba(255,255,255,0.1); color:#fff;" onclick="toggleEdit(${e.id})">Edit</button>
          <button class="tab-btn" style="height:34px; font-size:11px; background:rgba(255,59,48,0.1); color:#ff3b30;" onclick="del(${e.id})">Delete</button>
        </div>
      `;
      out.appendChild(div);
    });
  }

  function toggleEdit(id) {
    const entry = data.find(x => x.id === id);
    const div = document.getElementById(`entry-${id}`);
    
    div.innerHTML = `
      <span class="date-badge">${entry.date}</span>
      <input type="text" id="edit-ex-${id}" class="edit-input" value="${entry.ex}">
      <div style="display:flex; gap:10px;">
        <input type="number" id="edit-w-${id}" class="edit-input" value="${entry.w}" placeholder="kg">
        <input type="number" id="edit-r-${id}" class="edit-input" value="${entry.r}" placeholder="reps">
      </div>
      <div style="margin-top:10px; display:flex; gap:10px;">
        <button class="tab-btn" style="height:34px; font-size:11px; background:var(--success); color:#000;" onclick="saveEdit(${id})">Update</button>
        <button class="tab-btn" style="height:34px; font-size:11px; background:rgba(255,255,255,0.1); color:#fff;" onclick="show()">Cancel</button>
      </div>
    `;
  }

  function saveEdit(id) {
    const newEx = document.getElementById(`edit-ex-${id}`).value;
    const newW = document.getElementById(`edit-w-${id}`).value;
    const newR = document.getElementById(`edit-r-${id}`).value;

    if(!newEx || !newW || !newR) return alert("Fields cannot be empty");

    const index = data.findIndex(x => x.id === id);
    data[index].ex = newEx;
    data[index].w = newW;
    data[index].r = newR;

    save();
    show();
  }

  function del(id){
    if(confirm("Permanently delete this record?")) {
      data = data.filter(x=>x.id!==id);
      save(); show();
    }
  }

  function downloadPDF(){
    const { jsPDF } = window.jspdf;
    let pdf = new jsPDF();
    pdf.setFont("helvetica", "bold");
    pdf.text("PROGRESS REPORT", 20, 20);
    pdf.setFontSize(10);
    data.forEach((e, i) => {
      pdf.text(`${e.date} | ${e.day.toUpperCase()} | ${e.ex}: ${e.w}kg x ${e.r}`, 20, 35 + (i * 7));
    });
    pdf.save("Workout_History.pdf");
  }

  function save(){
    localStorage.setItem("gymData", JSON.stringify(data));
  }

  setDay('push');
</script>

</body>
</html>
